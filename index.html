<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOB NEXUS - Smart Career Recommendations</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap');

        :root {
            --bg-deep: #03030b;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .blob-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-deep);
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(80px);
            animation: float 20s infinite ease-in-out;
        }

        .b1 { width: 500px; height: 500px; background: var(--accent-purple); top: -100px; left: -100px; animation-delay: 0s; }
        .b2 { width: 400px; height: 400px; background: var(--accent-blue); bottom: -80px; right: -80px; animation-delay: -5s; }
        .b3 { width: 300px; height: 300px; background: var(--accent-cyan); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }
        .b4 { width: 350px; height: 350px; background: var(--accent-green); top: -50px; right: 10%; animation-delay: -15s; }
        .b5 { width: 250px; height: 250px; background: var(--accent-red); bottom: 5%; left: 5%; animation-delay: -7s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 60px) scale(0.9); }
            75% { transform: translate(40px, 30px) scale(1.05); }
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 60px 48px;
            max-width: 520px;
            width: 90vw;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(6,182,212,0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .gradient-title {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(139, 92, 246, 0.1);
            border-top-color: var(--accent-purple);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--text-dim);
            min-height: 1.5em;
            transition: opacity 0.3s ease;
        }

        .status-text.warm {
            color: var(--accent-cyan);
        }

        .status-text.error {
            color: var(--accent-red);
        }

        .launch-btn {
            display: none;
            margin: 24px auto 0;
            padding: 14px 48px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
        }

        .launch-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4);
        }

        .tagline {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
            margin-top: 32px;
        }

        @media (max-width: 480px) {
            .card { padding: 40px 24px; }
            .gradient-title { font-size: 2.2rem; }
            .subtitle { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="blob-bg">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
        <div class="bubble b5"></div>
    </div>

    <div class="card">
        <h1 class="gradient-title">JOB NEXUS</h1>
        <div class="subtitle">Welcome to Job Nexus</div>

        <div class="spinner" id="spinner"></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="status-text" id="status-text">Waking up... 0%</div>

        <a class="launch-btn" id="launch-btn" href="https://job-nexus-rt9c.onrender.com" target="_blank">Launch Dashboard</a>

        <div class="tagline">Smart Career Recommendations</div>
    </div>

    <script>
        const TARGET = 'https://job-nexus-rt9c.onrender.com';
        const STATUS = document.getElementById('status-text');
        const PROGRESS = document.getElementById('progress-fill');
        const SPINNER = document.getElementById('spinner');
        const BTN = document.getElementById('launch-btn');

        let progress = 0;
        let attempts = 0;
        const MAX_ATTEMPTS = 40;

        function setProgress(pct, text, cls) {
            progress = Math.min(pct, 95);
            PROGRESS.style.width = progress + '%';
            STATUS.textContent = text;
            if (cls) STATUS.className = 'status-text ' + cls;
            else STATUS.className = 'status-text';
        }

        function done() {
            setProgress(100, '100% — Ready!', 'warm');
            SPINNER.style.display = 'none';
            BTN.style.display = 'inline-block';
            PROGRESS.style.width = '100%';
        }

        function launch() {
            done();
        }

        function check() {
            attempts++;
            const p = Math.min(10 + Math.floor(attempts / 40 * 80), 90);

            fetch(TARGET + '/api/skills/all', { mode: 'cors', cache: 'no-store' })
                .then(r => {
                    if (r.ok) {
                        launch();
                    } else if (attempts < MAX_ATTEMPTS) {
                        setProgress(p, `Waking up... ${p}%`);
                        setTimeout(check, 2000);
                    } else {
                        setProgress(95, '95% — Taking longer than usual', 'error');
                        SPINNER.style.display = 'none';
                        BTN.style.display = 'inline-block';
                    }
                })
                .catch(() => {
                    if (attempts < MAX_ATTEMPTS) {
                        setProgress(p, `Waking up... ${p}%`);
                        setTimeout(check, 2000);
                    } else {
                        setProgress(95, '95% — Taking longer than usual', 'error');
                        SPINNER.style.display = 'none';
                        BTN.style.display = 'inline-block';
                    }
                });
        }

        setTimeout(check, 1500);
    </script>
</body>
</html>
